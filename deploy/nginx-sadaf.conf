# SADAF Clinic — denta.tw1.ru + sadaf.denta.tw1.ru
# Проксирует на gunicorn (127.0.0.1:8021). Статику/медиа отдаёт whitenoise через сам Django,
# но static и media также раздаются nginx напрямую для скорости.
# HTTPS-блок добавляет certbot автоматически (--nginx).

upstream sadaf_app {
    server 127.0.0.1:8021;
}

server {
    listen 80;
    listen [::]:80;
    server_name denta.tw1.ru sadaf.denta.tw1.ru;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/sadaf/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/sadaf/media/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://sadaf_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
