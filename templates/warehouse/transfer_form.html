{% extends "base.html" %}
{% block page_title %}Новое перемещение{% endblock %}

{% block content %}
<div class="max-w-2xl" x-data="{rows:[{}]}">
  <div class="card overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100" style="background:linear-gradient(135deg,#6366F1,#8B5CF6)">
      <h2 class="font-bold text-white text-lg">Перемещение материалов</h2>
    </div>
    <form method="post" class="p-6 space-y-4">
      {% csrf_token %}
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">Откуда *</label>
          <select name="from_branch" required>
            {% for b in branches %}<option value="{{ b.pk }}">{{ b.name }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">Куда *</label>
          <select name="to_branch" required>
            {% for b in branches %}<option value="{{ b.pk }}">{{ b.name }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">Дата</label>
          <input type="date" name="date" value="{% now 'Y-m-d' %}">
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-xs font-semibold text-slate-600 uppercase">Материалы</label>
          <button type="button" @click="rows.push({})" class="text-xs text-indigo-600 hover:underline">+ Добавить</button>
        </div>
        <template x-for="(row, i) in rows" :key="i">
          <div class="flex gap-2 mb-2">
            <select name="product" class="flex-1">
              <option value="">— Материал —</option>
              {% for p in products %}<option value="{{ p.pk }}">{{ p.name }} ({{ p.quantity }} {{ p.unit }})</option>{% endfor %}
            </select>
            <input type="number" name="quantity" step="0.001" min="0" placeholder="Кол-во" class="w-32">
            <button type="button" @click="rows.splice(i,1)" x-show="rows.length>1" class="text-red-400 hover:text-red-600 px-2 text-xl">&times;</button>
          </div>
        </template>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">Примечание</label>
        <textarea name="notes" rows="2"></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary">Создать перемещение</button>
        <a href="/warehouse/transfers/" class="btn-ghost">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
