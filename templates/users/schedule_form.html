{% extends "base.html" %}
{% block page_title %}График — {{ object.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="card overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100" style="background:linear-gradient(135deg,#6366F1,#8B5CF6)">
      <h2 class="font-bold text-white text-lg">{{ object.name }}</h2>
      <p class="text-indigo-200 text-sm">График работы по дням недели</p>
    </div>
    <form method="post" class="p-6 space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">Филиал</label>
        <select name="branch">
          {% for b in branches %}<option value="{{ b.pk }}">{{ b.name }}</option>{% endfor %}
        </select>
      </div>

      <div class="space-y-2">
        {% for d in day_rows %}
        <div class="flex items-center gap-3 p-3 border border-slate-200 rounded-xl">
          <label class="flex items-center gap-2 w-40 cursor-pointer">
            <input type="checkbox" name="work_{{ d.num }}" {% if d.working %}checked{% endif %}
                   class="accent-indigo-600">
            <span class="text-sm font-semibold text-slate-700">{{ d.label }}</span>
          </label>
          <div class="flex items-center gap-2 flex-1">
            <input type="time" name="start_{{ d.num }}" value="{{ d.start }}"
                   class="px-2 py-1.5 border border-slate-200 rounded-lg text-sm">
            <span class="text-slate-400">—</span>
            <input type="time" name="end_{{ d.num }}" value="{{ d.end }}"
                   class="px-2 py-1.5 border border-slate-200 rounded-lg text-sm">
          </div>
        </div>
        {% endfor %}
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary">Сохранить график</button>
        <a href="/users/schedule/" class="btn-ghost">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
