<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чек #{{ treatment.pk }} — выбор формата</title>
<style>
  body { font-family: Arial, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #fff; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 400px; width: 100%; }
  h2 { margin: 0 0 6px; font-size: 20px; color: #1e293b; }
  p { color: #64748b; font-size: 14px; margin: 0 0 28px; }
  .btns { display: flex; flex-direction: column; gap: 12px; }
  a.btn { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; transition: opacity .15s; }
  a.btn:hover { opacity: .88; }
  .btn-thermal { background: linear-gradient(135deg,#6366F1,#4F46E5); color: #fff; }
  .btn-a4     { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
  .icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  .icon-th { background: rgba(255,255,255,.2); }
  .icon-a4 { background: rgba(99,102,241,.1); }
  .label { text-align: left; }
  .label span { display: block; font-size: 11px; font-weight: 400; opacity: .75; margin-top: 1px; }
</style>
</head>
<body>
<div class="box">
  <h2>Чек №{{ treatment.pk }}</h2>
  <p>{{ treatment.patient.full_name }} · {{ treatment.created_at|date:"d.m.Y H:i" }}</p>
  <div class="btns">
    <a href="/treatments/{{ treatment.pk }}/receipt-print/" class="btn btn-thermal" target="_blank">
      <div class="icon icon-th">🧾</div>
      <div class="label">80мм термолента<span>С QR-кодом · автопечать</span></div>
    </a>
    <a href="/treatments/{{ treatment.pk }}/receipt/?fmt=a4" class="btn btn-a4" target="_blank">
      <div class="icon icon-a4">📄</div>
      <div class="label">A4 формат<span>PDF для принтера</span></div>
    </a>
  </div>
</div>
</body>
</html>
