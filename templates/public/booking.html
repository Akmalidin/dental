<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Запись — {{ clinic.name }}</title>
  <style>
    :root{ --accent: {{ site.theme_color|default:"#4F46E5" }}; }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#1e293b;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:24px}
    .box{max-width:440px}
    h1{font-size:28px;margin-bottom:10px}
    p{color:#64748b;margin-bottom:24px}
    a{display:inline-block;background:var(--accent);color:#fff;padding:12px 26px;border-radius:999px;font-weight:600;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h1>Онлайн-запись скоро</h1>
    <p>Запись на приём в клинику «{{ clinic.name }}» появится здесь в ближайшее время. Пока позвоните нам{% if site.phone %}: <strong>{{ site.phone }}</strong>{% endif %}.</p>
    <a href="/">← На главную</a>
  </div>
</body>
</html>
