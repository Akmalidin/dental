<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — AKM SOFT CLINIC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full flex items-center justify-center" style="background:linear-gradient(135deg,#1E1B4B 0%,#312E81 40%,#4C1D95 100%)">

<div class="w-full max-w-sm px-4">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex w-16 h-16 rounded-2xl items-center justify-center mb-4 shadow-xl"
         style="background:linear-gradient(135deg,#6366F1,#A855F7)">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2C8 2 6 5 6 9c0 5 2 13 4 13 1.5 0 1.5-3 2-3s.5 3 2 3c2 0 4-8 4-13 0-4-2-7-6-7z" fill="#fff" fill-opacity=".25"/></svg>
    </div>
    <h1 class="text-2xl font-black text-white">{% if clinic_settings %}{{ clinic_settings.name }}{% else %}Denta Clinic{% endif %}</h1>
    <p class="text-indigo-300 text-sm mt-1">Облачная CRM для стоматологий</p>
  </div>

  <!-- Card -->
  <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl p-7 shadow-2xl">
    <h2 class="text-white font-bold text-lg mb-5">Вход в систему</h2>

    <form method="post" action="/login/" class="space-y-4" x-data="{loading:false}" @submit="loading=true">
      {% csrf_token %}

      {% if form.non_field_errors %}
      <div class="bg-red-500/20 border border-red-400/40 text-red-200 text-sm px-4 py-3 rounded-xl">
        {{ form.non_field_errors|join:" " }}
      </div>
      {% endif %}

      <div>
        <label class="block text-indigo-200 text-sm font-medium mb-1.5">Логин или email</label>
        <input type="text" name="login" autofocus required
               class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 text-white placeholder-indigo-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
               placeholder="admin">
      </div>

      <div>
        <label class="block text-indigo-200 text-sm font-medium mb-1.5">Пароль</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2.5 rounded-xl bg-white/10 border border-white/20 text-white placeholder-indigo-300 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
               placeholder="••••••••">
      </div>

      <button type="submit" :disabled="loading"
              class="w-full py-2.5 rounded-xl text-sm font-bold text-white shadow-lg mt-2 flex items-center justify-center gap-2"
              style="background:linear-gradient(135deg,#6366F1,#A855F7)"
              :style="loading ? 'opacity:.7' : ''">
        <svg x-show="loading" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        <span x-text="loading ? 'Входим...' : 'Войти в систему'">Войти в систему</span>
      </button>
    </form>
  </div>

  <p class="text-center text-indigo-400 text-xs mt-6">© 2025 AKM SOFT. Все права защищены.</p>
</div>

</body>
</html>
