{% extends "base.html" %}
{% block page_title %}ЭМК шаблоны{% endblock %}

{% block content %}
<div class="card">
  <div class="flex items-center justify-between px-5 py-4" style="border-bottom:1px solid var(--border)">
    <a href="/settings/emr-templates/create/" class="btn btn-primary btn-sm">+ Создать</a>
    <form method="get" class="search-box w-64">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" name="q" value="{{ q }}" placeholder="Поиск...">
    </form>
  </div>
  <table class="tbl">
    <thead><tr><th>Название</th><th class="text-right pr-5">Действия</th></tr></thead>
    <tbody>
      {% for t in templates %}
      <tr>
        <td class="font-semibold">{{ t.name }}</td>
        <td>
          <div class="flex items-center justify-end gap-1.5 pr-3">
            <a href="/settings/emr-templates/{{ t.pk }}/edit/" class="row-act ra-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></a>
            <form method="post" action="/settings/emr-templates/{{ t.pk }}/delete/" onsubmit="return confirm('Удалить шаблон?')">{% csrf_token %}<button class="row-act ra-del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></form>
          </div>
        </td>
      </tr>
      {% empty %}
      <tr><td colspan="2" class="text-center py-12 muted">Шаблонов нет. Создайте первый.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
